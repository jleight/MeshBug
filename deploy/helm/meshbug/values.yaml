image:
  repository: ghcr.io/jleight/meshbug
  tag: ""           # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

logLevel: info

postgres:
  # Secret you create out-of-band; key must contain a full DSN.
  existingSecret: meshbug-postgres
  existingSecretKey: dsn

# MQTT brokers used by the ingest deployment. Each entry references an
# existingSecret containing username/password keys. The structural list is
# rendered into a ConfigMap; credentials are injected as env vars from the
# Secret and merged at startup by the ingest binary.
#
# brokers:
#   - name: home
#     url: wss://mqtt.example.com:443
#     topicPrefix: meshcore/
#     existingSecret: meshbug-broker-home
#     usernameKey: username
#     passwordKey: password
brokers: []

ingest:
  autoMigrate: true     # ingest runs the migrations (it owns the schema)
  resources:
    requests: { cpu: 50m, memory: 96Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

web:
  replicaCount: 1
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: ""
  host: meshbug.local
  tls: false
  annotations: {}

serviceAccount:
  create: true
  name: ""
