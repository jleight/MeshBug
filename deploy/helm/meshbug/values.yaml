image:
  repository: ghcr.io/jleight/meshbug
  tag: ""           # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

logLevel: info

postgres:
  # Secret you create out-of-band; key must contain a full DSN. Owns the
  # `project` and `web` schemas (derived state, future web tables).
  existingSecret: meshbug-postgres
  existingSecretKey: dsn

  # Optional: a separate DSN for the `ingest` schema (raw_events). When unset
  # the app falls back to the main DSN above, which is the common case.
  # Override this when you want to point ingest at a different database —
  # for example, run projector + web against a local container while reading
  # raw_events from a prod read-replica.
  ingestExistingSecret: ""
  ingestExistingSecretKey: ""

# MQTT brokers used by the ingest deployment. Each entry references an
# existingSecret containing username/password keys. The structural list is
# rendered into a ConfigMap; credentials are injected as env vars from the
# Secret and merged at startup by the ingest binary.
#
# brokers:
#   - name: home
#     url: wss://mqtt.example.com:443
#     topicPrefix: meshcore/
#     existingSecret: meshbug-broker-home
#     usernameKey: username
#     passwordKey: password
brokers: []

# A Job that runs `meshbug migrate` as a Helm pre-install/pre-upgrade hook.
# Required: the ingest/project/web services CheckMigrations at startup and
# refuse to run if the database isn't current.
migrationHook:
  enabled: true
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 250m, memory: 128Mi }

ingest:
  replicaCount: 1
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 250m, memory: 128Mi }
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

project:
  # Single replica only — cursor + rollup + anomaly workers assume one writer.
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 1, memory: 512Mi }
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

web:
  replicaCount: 1
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: ""
  host: meshbug.local
  tls: false
  annotations: {}

serviceAccount:
  create: true
  name: ""
