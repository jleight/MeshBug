apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "meshbug.fullname" . }}-web
  labels:
    {{- include "meshbug.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "meshbug.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "meshbug.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
      {{- with .Values.web.podAnnotations }}
      annotations: {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "meshbug.serviceAccountName" . }}
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["web"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: MESHBUG_HTTP_ADDR
              value: ":8080"
            - name: MESHBUG_LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            {{- include "meshbug.databaseEnv" . | nindent 12 }}
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
          resources: {{- toYaml .Values.web.resources | nindent 12 }}
      {{- with .Values.web.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
