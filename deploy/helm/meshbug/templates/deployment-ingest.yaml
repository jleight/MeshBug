apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "meshbug.fullname" . }}-ingest
  labels:
    {{- include "meshbug.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest
spec:
  # Single replica: rollup + anomaly workers + partition maintenance all
  # assume one writer per database. Don't scale this above 1.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "meshbug.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ingest
  template:
    metadata:
      labels:
        {{- include "meshbug.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ingest
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.ingest.podAnnotations }}{{ toYaml . | nindent 8 }}{{- end }}
    spec:
      serviceAccountName: {{ include "meshbug.serviceAccountName" . }}
      containers:
        - name: ingest
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["ingest"]
          env:
            - name: MESHBUG_LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: MESHBUG_AUTO_MIGRATE
              value: {{ .Values.ingest.autoMigrate | quote }}
            - name: MESHBUG_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.existingSecret }}
                  key: {{ .Values.postgres.existingSecretKey }}
            - name: MESHBUG_BROKERS_CONFIG
              value: /etc/meshbug/brokers.json
            {{- range $b := .Values.brokers }}
            {{- $envKey := upper (replace "-" "_" $b.name) }}
            - name: MESHBUG_BROKER_{{ $envKey }}_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $b.existingSecret }}
                  key: {{ default "username" $b.usernameKey }}
            - name: MESHBUG_BROKER_{{ $envKey }}_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $b.existingSecret }}
                  key: {{ default "password" $b.passwordKey }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/meshbug
              readOnly: true
          resources: {{- toYaml .Values.ingest.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "meshbug.fullname" . }}-config
      {{- with .Values.ingest.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ingest.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ingest.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
