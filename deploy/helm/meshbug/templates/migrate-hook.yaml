{{- if .Values.migrationHook.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "meshbug.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "meshbug.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrationHook.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migrationHook.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "meshbug.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["migrate"]
          env:
            - name: MESHBUG_LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            {{- include "meshbug.databaseEnv" . | nindent 12 }}
          resources: {{- toYaml .Values.migrationHook.resources | nindent 12 }}
{{- end }}
