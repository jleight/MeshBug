name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    # Skip on dependabot PRs and bot accounts.
    if: >-
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)
      || github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        if: >-
          (github.event_name == 'issue_comment' && github.event.comment.body)
          || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          # Signatures live in this repo on the `cla-signatures` branch, so
          # the default GITHUB_TOKEN with `contents: write` (declared above)
          # is sufficient. A PERSONAL_ACCESS_TOKEN would only be needed if
          # signatures were stored in a separate repo or org.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/v1/cla.json'
          path-to-document: 'https://github.com/jleight/MeshBug/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'dependabot[bot],renovate[bot]'
          custom-notsigned-prcomment: >
            Thanks for the contribution! Before we can merge, please read the
            [MeshBug Contributor License Agreement](https://github.com/jleight/MeshBug/blob/main/CLA.md)
            and sign it by replying to this comment with the exact line below.
            You only need to do this once — future PRs from your GitHub
            account will auto-pass.
          custom-pr-sign-comment: >
            I have read the MeshBug CLA and agree to its terms for this and
            all future contributions to the Project.
          custom-allsigned-prcomment: >
            All contributors have signed the CLA. ✅
          lock-pullrequest-aftermerge: false
