name: Release

# Date-based, auto-incrementing versions — no manual tags.
#
#   version = {year}.{month}.{N}     N = Nth run of this workflow this month
#   plus    `-beta` suffix when triggered by a pull_request
#
# N is computed at runtime by counting prior runs of this workflow file in
# the current calendar month via the GitHub API, so it resets to 1 on the
# first run of each new month. GitHub Actions doesn't ship an Azure DevOps-
# style auto-resetting counter; this reproduces that behavior.
#
# What gets published:
#   PR (same-repo head):  container only, tagged :{version}        e.g. :2026.5.42-beta
#   PR (fork head):       skipped — fork PRs cannot push to ghcr
#   push to main:         container :{version} + :latest, Helm chart, GitHub Release

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  IMAGE: ghcr.io/${{ github.repository_owner }}/meshbug
  CHART_REPO: ghcr.io/${{ github.repository_owner }}/charts

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      is_release: ${{ steps.v.outputs.is_release }}
      can_push: ${{ steps.v.outputs.can_push }}
    steps:
      - id: v
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          year=$(date -u +%Y)
          month=$(date -u +%-m)
          month_start=$(date -u +%Y-%m-01T00:00:00Z)

          # Count runs of this workflow that started on or after the 1st of
          # the current month. `total_count` is returned by the API and
          # already includes the current in-progress run, so this value is
          # the per-month build number we want.
          n=$(gh api -X GET \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/runs" \
            -f "created=>=${month_start}" \
            -f "per_page=1" \
            --jq '.total_count')

          base="${year}.${month}.${n}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            version="${base}-beta"
            is_release="false"
            head_repo="${{ github.event.pull_request.head.repo.full_name }}"
            if [ "$head_repo" = "${{ github.repository }}" ]; then
              can_push="true"
            else
              can_push="false"
            fi
          else
            version="${base}"
            is_release="true"
            can_push="true"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "is_release=${is_release}" >> "$GITHUB_OUTPUT"
          echo "can_push=${can_push}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${version} (is_release=${is_release}, can_push=${can_push})"

  container:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: needs.version.outputs.can_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          tags="${{ env.IMAGE }}:${{ needs.version.outputs.version }}"
          if [ "${{ needs.version.outputs.is_release }}" = "true" ]; then
            tags="${tags}"$'\n'"${{ env.IMAGE }}:latest"
          fi
          {
            echo 'tags<<EOF'
            echo "$tags"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build (and push, if permitted)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ needs.version.outputs.can_push }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Elastic-2.0
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Comment image tag on PR
        if: github.event_name == 'pull_request' && needs.version.outputs.can_push == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-image
          message: |
            🐳 Built PR container image:
            ```
            docker pull ${{ env.IMAGE }}:${{ needs.version.outputs.version }}
            ```

  chart:
    needs: [version, container]
    if: needs.version.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package chart
        id: pkg
        run: |
          version="${{ needs.version.outputs.version }}"
          mkdir -p dist
          helm package deploy/helm/meshbug \
            --version "$version" \
            --app-version "$version" \
            --destination dist
          echo "file=dist/meshbug-${version}.tgz" >> "$GITHUB_OUTPUT"

      - name: Push chart to OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} --password-stdin
          helm push "${{ steps.pkg.outputs.file }}" "oci://${{ env.CHART_REPO }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.pkg.outputs.file }}
          body: |
            ## Container image
            ```
            docker pull ${{ env.IMAGE }}:${{ needs.version.outputs.version }}
            ```

            ## Helm chart
            ```
            helm install meshbug oci://${{ env.CHART_REPO }}/meshbug --version ${{ needs.version.outputs.version }}
            ```

            The chart's default `image.tag` matches `appVersion`, so this
            chart release pulls the container image listed above.
